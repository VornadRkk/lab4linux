- name: Deploy lab4 service
  hosts: lab4
  become: yes

  tasks:
    - name: Install required packages
      apt:
        name:
          - python3
          - python3-venv
          - curl
        state: present
        update_cache: yes

    - name: Create service directory
      file:
        path: /opt/lab4-service/html
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'
        recurse: yes

    - name: Deploy index.html
      copy:
        dest: /opt/lab4-service/html/index.html
        content: "Volkov\n"
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Copy service.sh
      copy:
        src: service.sh
        dest: /opt/lab4-service/service.sh
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Create lab4-service systemd unit
      copy:
        dest: /etc/systemd/system/lab4-service.service
        mode: '0644'
        content: |
          [Unit]
          Description=Lab4 HTTP Service
          After=network.target

          [Service]
          User=www-data
          WorkingDirectory=/opt/lab4-service/html
          ExecStart=/usr/bin/python3 -m http.server 8000
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable and start lab4-service
      systemd:
        name: lab4-service
        enabled: yes
        state: started
